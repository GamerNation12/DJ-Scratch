name: Auto Deploy to Pterodactyl

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web/**'
      - 'android-app/**'
      - 'desktop-app/**'
      - '.github/**'
      - '*.apk'
      - '*.zip'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install paramiko python-dotenv
        
      - name: Sync Files to Server via SFTP
        env:
          PTERO_PASSWORD: ${{ secrets.PTERO_PASSWORD }}
        run: python deploy.py


