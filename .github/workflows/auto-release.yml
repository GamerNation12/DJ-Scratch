name: Automate GitHub Releases

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Update Size'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      build_pc:
        description: 'Build PC App (.exe)'
        required: true
        type: boolean
        default: true
      build_android:
        description: 'Build Android App (.apk)'
        required: true
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Auto-Bump Versions
        id: version_bump
        run: |
          git config --global user.name "GamerNation12"
          git config --global user.email "GamerNation12@users.noreply.github.com"
          
          cd desktop-app
          npm version ${{ github.event.inputs.bump }} --no-git-tag-version
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          echo "NEW_VERSION=$TAG" >> $env:GITHUB_OUTPUT
          cd ..
          
          cd android-app
          $content = Get-Content pubspec.yaml -Raw
          $content = [System.Text.RegularExpressions.Regex]::Replace($content, 'version: \d+\.\d+\.\d+\+(\d+)', { param($m) "version: $VERSION+" + ([int]$m.Groups[1].Value + 1) })
          Set-Content pubspec.yaml $content -NoNewline
          cd ..
          
          git add desktop-app/package.json desktop-app/package-lock.json android-app/pubspec.yaml
          git commit -m "chore: auto-bump version to $TAG"
          git tag $TAG
          git push origin HEAD --follow-tags

      - name: Install Desktop App Dependencies
        if: ${{ github.event.inputs.build_pc == 'true' }}
        working-directory: desktop-app
        run: npm install

      - name: Build Windows Executable
        if: ${{ github.event.inputs.build_pc == 'true' }}
        working-directory: desktop-app
        run: npm run build:vite && npx electron-builder -w --publish never

      - name: Build Android APK
        if: ${{ github.event.inputs.build_android == 'true' }}
        working-directory: android-app
        run: |
          flutter pub get
          flutter build apk --release
          cd build/app/outputs/flutter-apk/
          Rename-Item app-release.apk DJ-Scratch.apk

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.NEW_VERSION }}
          name: DJ Scratch ${{ steps.version_bump.outputs.NEW_VERSION }}
          draft: false
          prerelease: false
          # Upload everything that was successfully built in the previous steps
          files: |
            desktop-app/dist2/*.exe
            desktop-app/dist2/*.exe.blockmap
            desktop-app/dist2/latest.yml
            android-app/build/app/outputs/flutter-apk/DJ-Scratch.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
