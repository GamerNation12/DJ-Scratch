<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linking Account...</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background-color: #1e1e1e;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 90%;
    }
    h1 { margin-top: 0; }
    p { font-size: 1.1em; color: #b3b3b3; line-height: 1.5; }
    .loader {
      border: 4px solid #333;
      border-top: 4px solid #4caf50;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .success { color: #4caf50; }
    .error { color: #f44336; }
  </style>
</head>
<body>
  <div class="container" id="status-container">
    <div class="loader" id="loader"></div>
    <h1 id="title">Linking Account...</h1>
    <p id="message">Please wait while we securely connect your Last.fm account to Discord.</p>
  </div>

  <script>
    async function processLogin() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const discordId = urlParams.get('discord_id');

      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      const loaderEl = document.getElementById('loader');

      if (!token || !discordId) {
        loaderEl.style.display = 'none';
        titleEl.textContent = '❌ Error';
        titleEl.className = 'error';
        messageEl.textContent = 'Missing required parameters. Please try logging in again via Discord.';
        return;
      }

      try {
        // Send to Vercel backend
        const res = await fetch(`https://the-goats-dj.vercel.app/api/auth/lastfm/callback?token=${token}&discord_id=${discordId}`);
        const data = await res.json();

        loaderEl.style.display = 'none';

        if (res.ok && data.success) {
          titleEl.textContent = '✅ Success!';
          titleEl.className = 'success';
          messageEl.innerHTML = `Your Last.fm account <strong>${data.username}</strong> has been successfully linked.<br><br>You may now safely close this tab and return to Discord.`;
        } else {
          titleEl.textContent = '❌ Authentication Failed';
          titleEl.className = 'error';
          messageEl.textContent = data.error || 'An unknown error occurred.';
        }
      } catch (err) {
        loaderEl.style.display = 'none';
        titleEl.textContent = '❌ Connection Error';
        titleEl.className = 'error';
        messageEl.textContent = 'Failed to communicate with the authentication server. Please try again later.';
      }
    }

    window.onload = processLogin;
  </script>
</body>
</html>
