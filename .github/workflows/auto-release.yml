name: Automate GitHub Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Desktop App Dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Windows Executable
        working-directory: desktop-app
        # electron-builder requires GH_TOKEN if publish is configured in package.json,
        # but since we upload manually in the next step, we disable publishing here.
        run: npm run build:vite && npx electron-builder -w --publish never

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: DJ Scratch ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            desktop-app/dist2/*.exe
            web/public/DJ-Scratch.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
