name: Deploy Frontend to Web Host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./web
        run: npm install

      - name: Build Static Export
        working-directory: ./web
        env:
          BUILD_STATIC: "true"
          NEXT_PUBLIC_API_URL: "https://the-goats-dj.vercel.app"
        run: |
          # Temporarily hide the api folder so static export doesn't crash
          mv src/app/api src/app/_api_temp
          npm run build
          # Move it back just in case
          mv src/app/_api_temp src/app/api

      - name: Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/out/
          server-dir: /domains/the-goats-dj.hostedbyfps.com/public_html/
          danger-clean-dir: true # This automatically clears old files before uploading new ones
