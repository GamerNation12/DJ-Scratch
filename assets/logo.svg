<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Background Gradient (Rich Midnight to Deep Blue) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Record Material Gradient -->
    <radialGradient id="recordGrad" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#1e293b" />
      <stop offset="90%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Vinyl Reflection Gradient -->
    <linearGradient id="vinylReflect" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="52%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
    
    <!-- Neon Accent (Electric Cyan) -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glowing Shadow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Outer Rounded Square Background -->
  <rect width="600" height="600" rx="120" fill="url(#bgGrad)" />
  
  <!-- Equalizer Bars Background -->
  <g opacity="0.15" fill="#22d3ee">
    <rect x="70" y="380" width="18" height="100" rx="9" />
    <rect x="100" y="330" width="18" height="150" rx="9" />
    <rect x="130" y="260" width="18" height="220" rx="9" />
    <rect x="160" y="310" width="18" height="170" rx="9" />
    <rect x="190" y="400" width="18" height="80" rx="9" />
    
    <rect x="390" y="390" width="18" height="90" rx="9" />
    <rect x="420" y="310" width="18" height="170" rx="9" />
    <rect x="450" y="240" width="18" height="240" rx="9" />
    <rect x="480" y="290" width="18" height="190" rx="9" />
    <rect x="510" y="360" width="18" height="120" rx="9" />
  </g>

  <!-- Glowing Pulse Rings -->
  <circle cx="300" cy="300" r="230" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 12" opacity="0.3" filter="url(#neonGlow)" />
  <circle cx="300" cy="300" r="260" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="20 40" opacity="0.15" />
  
  <!-- The Vinyl Record -->
  <g filter="url(#softShadow)">
    <circle cx="300" cy="300" r="190" fill="url(#recordGrad)" stroke="#334155" stroke-width="3" />
    <!-- Record Reflection -->
    <circle cx="300" cy="300" r="188" fill="url(#vinylReflect)" />
    
    <!-- Grooves -->
    <circle cx="300" cy="300" r="160" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.5" />
    <circle cx="300" cy="300" r="140" fill="none" stroke="#000000" stroke-width="4" stroke-opacity="0.3" />
    <circle cx="300" cy="300" r="120" fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.6" />
    <circle cx="300" cy="300" r="100" fill="none" stroke="#000000" stroke-width="5" stroke-opacity="0.2" />
    
    <!-- Record Label -->
    <circle cx="300" cy="300" r="70" fill="url(#neonCyan)" />
    <circle cx="300" cy="300" r="62" fill="#0f172a" />
    
    <!-- Spindle Hole -->
    <circle cx="300" cy="300" r="12" fill="#e2e8f0" />
    <circle cx="300" cy="300" r="5" fill="#020617" />
  </g>

  <!-- Text inside the label -->
  <text x="300" y="260" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">DJ</text>
  <text x="300" y="352" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="14" fill="#22d3ee" text-anchor="middle" letter-spacing="1">SCRATCH</text>

  <!-- Scratch motion lines indicating movement -->
  <path d="M 180 380 Q 220 370 250 420" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" filter="url(#neonGlow)" opacity="0.8" />
  <path d="M 150 350 Q 180 340 210 390" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" filter="url(#neonGlow)" opacity="0.5" />

  <!-- Cybernetic DJ Hand Scratching -->
  <g filter="url(#softShadow)">
    <!-- Arm Base -->
    <polygon points="-20,620 30,500 90,480 70,560 0,620" fill="#0b1120" stroke="#0ea5e9" stroke-width="3" />
    <!-- Wrist -->
    <circle cx="80" cy="520" r="20" fill="#1e293b" stroke="#38bdf8" stroke-width="4" />
    <circle cx="80" cy="520" r="8" fill="#22d3ee" filter="url(#neonGlow)" />
    
    <!-- Palm -->
    <polygon points="75,505 110,440 160,470 120,535" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" />
    
    <!-- Middle Finger -->
    <polygon points="110,440 140,390 160,360 145,345 120,380 95,425" fill="#0f172a" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round" />
    <!-- Middle Joints -->
    <circle cx="140" cy="390" r="4" fill="#38bdf8" filter="url(#neonGlow)" />
    <circle cx="160" cy="360" r="3" fill="#ffffff" filter="url(#neonGlow)" />
    
    <!-- Index Finger -->
    <polygon points="125,450 170,410 200,400 190,380 150,390 110,430" fill="#0f172a" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round" />
    <!-- Index Joints -->
    <circle cx="170" cy="410" r="4" fill="#38bdf8" filter="url(#neonGlow)" />
    <circle cx="200" cy="400" r="3" fill="#ffffff" filter="url(#neonGlow)" />

    <!-- Thumb -->
    <polygon points="160,470 210,480 250,450 235,430 190,455 145,455" fill="#0f172a" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round" />
    <!-- Thumb Joints -->
    <circle cx="210" cy="480" r="4" fill="#38bdf8" filter="url(#neonGlow)" />
    <circle cx="250" cy="450" r="3" fill="#ffffff" filter="url(#neonGlow)" />
  </g>

  <!-- DJ Tonearm (Sleek, Pro) -->
  <g filter="url(#softShadow)">
    <!-- Base -->
    <circle cx="490" cy="110" r="45" fill="#1e293b" stroke="#334155" stroke-width="5"/>
    <circle cx="490" cy="110" r="22" fill="#475569" />
    <circle cx="490" cy="110" r="8" fill="#0f172a" />
    
    <!-- Arm -->
    <path d="M 480 120 L 430 200" fill="none" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round" />
    
    <!-- Headshell -->
    <g transform="translate(430, 200) rotate(122)">
      <rect x="0" y="-14" width="40" height="28" rx="4" fill="#94a3b8" />
      <rect x="18" y="-9" width="30" height="18" rx="2" fill="#334155" />
      <!-- Stylus tip -->
      <circle cx="45" cy="0" r="4" fill="#ef4444" filter="url(#neonGlow)" />
    </g>
  </g>

</svg>
