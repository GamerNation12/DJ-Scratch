name: Build Android App

on:
  push:
    paths:
      - 'android-app/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Install dependencies
        working-directory: ./android-app
        run: flutter pub get

      - name: Build APK
        working-directory: ./android-app
        run: flutter build apk --release

      - name: Move APK to web/public
        run: |
          mkdir -p web/public
          cp android-app/build/app/outputs/flutter-apk/app-release.apk web/public/The-Goats-DJ.apk

      - name: Commit and Push APK
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/public/The-Goats-DJ.apk
          git commit -m "chore: update android APK" || echo "No changes to commit"
          git push
