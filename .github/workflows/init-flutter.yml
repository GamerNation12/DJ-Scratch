name: Init Flutter

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter Project
        run: |
          flutter create --org com.gamernation --project-name the_goats_dj android-app

          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add android-app/
          git commit -m "chore: initialize flutter project boilerplate"
          git push
